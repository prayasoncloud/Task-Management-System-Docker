version: "3.9"

services:

  backend:
    build: ./backend
    container_name: backend

    ports:
      - "5000:5000"

    depends_on:
      - postgres

    environment:
      DB_HOST: postgres
      DB_NAME: tasks_db
      DB_USER: postgres
      DB_PASSWORD: password

  postgres:
    image: postgres:16

    container_name: postgres

    environment:
      POSTGRES_DB: tasks_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:latest

    container_name: nginx

    ports:
      - "80:80"

    depends_on:
      - backend

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data: